packages:
  - "integration-tests/**"
  - "packages/**"
  - "!**/dist/**"
  - "!**/temp/**"
  - "!**/test-data/**"
  - "!**/__snapshots/**"

catalog:
  "@babel/generator": ^7.29.7
  "@babel/template": ^7.29.7
  "@babel/types": ^7.29.7
  "@pnpm/lockfile.fs": ^1100.1.7
  "@pnpm/lockfile.utils": ^1100.1.0
  "@pnpm/lockfile.walker": ^1100.0.12
  "@pnpm/types": ^1101.3.2
  "@pnpm/logger": ^1100.0.0
  "@rollup/plugin-node-resolve": ^16.0.3
  "@rollup/pluginutils": ^5.4.0
  chalk: ^5.6.2
  commander: ^15.0.0
  debug: ^4.4.3
  esbuild: ^0.28.1
  find-git-root: ^1.1.0
  find-workspaces: ^0.3.1
  fs-extra: ^11.3.6
  import-meta-resolve: ^4.2.0
  js-yaml: ^4.3.0
  oxc-resolver: ^11.23.0
  postcss-import: ^16.1.1
  postcss: ^8.5.16
  prettier: ^3.9.4
  rollup-plugin-esbuild: ^6.2.1
  rollup: ^4.62.2
  rolldown: "^1.1.4"
  sass: ^1.101.0
  semver: ^7.8.5
  tinyglobby: ^0.2.17
  typescript: ^6.0.3
  vitefu: ^1.1.3
  zod-validation-error: ^5.0.0
  zod: ^4.4.3
  zx: ^8.8.5

  # Dev tooling
  "@changesets/cli": ^2.31.0
  "@types/babel__generator": ^7.27.0
  "@types/babel__template": ^7.4.4
  "@types/debug": ^4.1.13
  "@types/fs-extra": ^11.0.4
  "@types/js-yaml": ^4.0.9
  "@types/node": ^20.19.43
  "@types/postcss-import": ^14.0.3
  "@types/react": ^19.2.17
  "@types/semver": ^7.7.1
  "@typescript-eslint/parser": ^8.62.1
  eslint-config-prettier: ^10.1.8
  eslint-import-resolver-typescript: ^4.4.5
  eslint-plugin-headers: ^1.3.4
  eslint-plugin-import: ^2.32.0
  eslint-plugin-unused-imports: ^4.4.1
  eslint: ^9.39.4
  "@eslint/js": ^9.39.4
  "typescript-eslint": ^8.62.1
  husky: ^9.1.7
  lint-staged: ^17.0.8
  rimraf: ^6.1.3
  vite: ^8.1.3
  vitest: ^4.1.9

catalogs:
  # Used in integration tests, no need to keep these up to date
  tests:
    "@chakra-ui/icons": 2.1.1
    "@open-pioneer/chakra-integration": 1.1.3
    "@open-pioneer/core": 1.2.3
    "@open-pioneer/http": 2.1.8
    "@open-pioneer/map": 0.5.1
    "@open-pioneer/runtime": ">= 2.2.0"
    "@open-pioneer/react-utils": 0.2.3
    "@open-pioneer/test-utils": ^1.1.3
    "@types/proj4": 2.5.5
    "@types/jsdom": ^21.1.7
    "@types/react-dom": 18.3.0
    "@types/uuid": ^10.0.0
    classnames: ^2.5.1
    chakra-react-select: 4.9.1
    ol: 9.2.4
    proj4: 2.11.0
    react-dom: 18.3.1
    react-select: 5.8.0
    react-use: 17.5.1
    react: 18.3.1
    uuid: 10.0.0

# Install older versions by default
resolutionMode: "lowest-direct"

# Configure a release cooldown
minimumReleaseAge: 4320 # 3 days in minutes
minimumReleaseAgeExclude:
  - "@open-pioneer/*"
  - "@conterra/*"

overrides:
  # Version doesn't really matter, this is used as a dep in integration tests
  "@open-pioneer/runtime": "2.2.0"
  "@formatjs/intl@2.10.15>typescript": "*"

  # https://github.com/advisories/GHSA-h67p-54hq-rp68, CVE-2026-53550
  "js-yaml@>=4.0.0 <=4.1.1": "^4.1.2"

auditConfig:
  ignoreGhsas:
    # https://github.com/advisories/GHSA-w5hq-g745-h8pq, CVE-2026-41907
    - GHSA-w5hq-g745-h8pq

    # https://github.com/advisories/GHSA-qjx8-664m-686j, CVE-2026-46625
    - GHSA-qjx8-664m-686j

    # https://github.com/advisories/GHSA-h67p-54hq-rp68, CVE-2026-53550
    - GHSA-h67p-54hq-rp68

allowUnusedPatches: true
patchedDependencies: {}

peerDependencyRules:
  allowedVersions:
    # Versions don't really matter, these are used as deps in integration tests
    "@open-pioneer/chakra-integration>framer-motion": ">=4.0.0"
    "@open-pioneer/base-theme": "*"
    "@open-pioneer/chakra-integration@^2.2.0": "*"
    "@open-pioneer/runtime-react-support@^1.0.2": "*"
    "@open-pioneer/core": "*"

    # See overrides
    "fdir>picomatch": "*"

allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  # Seems to work fine without building
  unrs-resolver: false

trustPolicy: no-downgrade
trustPolicyExclude:
  - "undici-types@6.21.0"
  - "semver@6.3.1"
  - "chokidar@4.0.3"

# Workaround for current problems regarding our vite plugin + vite's optimizeDeps feature
shamefullyHoist: true

linkWorkspacePackages: false
strictPeerDependencies: true
